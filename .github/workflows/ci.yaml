name: CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "requirements.txt"
      - "pyproject.toml"
      - "luxonis_train/**"
      - "tests/**"
      - ".github/workflows/ci.yaml"
      - "!**/*.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  contents: write
  checks: write

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ github.head_ref }}

      - name: Install pre-commit
        run: python -m pip install 'pre-commit<4.0.0'

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  docs:
    needs:
      - pre-commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ github.head_ref }}

      - name: Install pydoctor
        run: pip install pydoctor

      - name: Install released version of LuxonisML
        if: startsWith(github.head_ref, 'release/') == true
        run: pip install luxonis-ml[utils]

      - name: Install dev version of LuxonisML
        if: startsWith(github.head_ref, 'release/') == false
        run: pip install "luxonis-ml[utils] @ git+https://github.com/luxonis/luxonis-ml.git@main"

      - name: Build LuxonisML intersphinx inventory
        run: python scripts/build_luxonis_ml_intersphinx.py

      - name: Build docs
        run: pydoctor

  type-check:
    needs:
      - pre-commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -e .[dev]

      - name: Install dev version of LuxonisML
        if: startsWith(github.head_ref, 'release/') == false
        run: |
          pip uninstall luxonis-ml -y
          pip install "luxonis-ml[data,tracker] @ git+https://github.com/luxonis/luxonis-ml.git@main"

      - name: Pyright check
        uses: jakebailey/pyright-action@8ec14b5cfe41f26e5f41686a31eb6012758217ef
        with:
          level: warning
          warnings: true
          python-version: "3.10"
          project: pyproject.toml

  # Tests that the `luxonis-train.config.Config` works
  # even when the dependencies of `luxonis-train` are
  # not installed.
  config-test:
    runs-on: ubuntu-latest
    needs:
      - pre-commit
      - type-check
      - docs

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.10"
          cache: pip

      - name: Install released version of LuxonisML
        if: startsWith(github.head_ref, 'release/') == true
        run: pip install luxonis-ml[utils]

      - name: Install dev version of LuxonisML
        if: startsWith(github.head_ref, 'release/') == false
        run: |
          pip install "luxonis-ml[utils] @ git+https://github.com/luxonis/luxonis-ml.git@main"

      - name: Test config without dependencies
        run: |
          pip install semver~=3.0 pydantic-extra-types~=2.10
          pip install -e . --no-deps
          python -c 'from luxonis_train.config import Config; \
                     from pathlib import Path; \
                     [Config.get_config(p)
                       for p in Path("configs").rglob("*.yaml")]'

  doctests:
    needs:
      - pre-commit
      - type-check
      - docs

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -e .[dev]

      - name: Install dev version of LuxonisML
        if: startsWith(github.head_ref, 'release/') == false
        run: |
          pip uninstall luxonis-ml -y
          pip install "luxonis-ml[data,tracker] @ git+https://github.com/luxonis/luxonis-ml.git@main"

      - name: Run doctests
        run: >
          pytest --doctest-modules luxonis_train
          --cov=luxonis_train
          --cov-report=xml
          --junitxml=junit.xml
          -o junit_family=legacy

      - name: Upload doctest results to Codecov
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          flags: doctest

      - name: Upload doctest coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          flags: doctest

      - name: Upload doctest coverage as artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-doctest
          path: coverage.xml
          overwrite: true
  tests:
    needs:
      - config-test
      - doctests

    strategy:
      matrix:
        suite: [unit, predefined, combinations, misc]

    runs-on: ${{ matrix.suite == 'unit' && 'ubuntu-latest' || 'ubuntu-t4-4core' }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -e .[dev]

      - name: Install dev version of LuxonisML
        if: startsWith(github.head_ref, 'release/') == false
        run: |
          pip uninstall luxonis-ml -y
          pip install "luxonis-ml[data,tracker] @ git+https://github.com/luxonis/luxonis-ml.git@main"

      - name: Authenticate to Google Cloud
        id: google-auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093
        with:
          credentials_json: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
          create_credentials_file: true
          export_environment_variables: true
          token_format: access_token

      - name: Run pytest
        env:
          LUXONISML_BUCKET: luxonis-test-bucket
          SUITE: ${{ matrix.suite }}
          HUBAI_API_KEY: ${{ secrets.HUBAI_API_KEY }}
        run: pytest -x --cov --junitxml=junit.xml -o junit_family=legacy -m "${SUITE}"

      - name: Upload test results to Codecov
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          flags: ${{ matrix.suite }}

      - name: Upload coverage results to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          flags: ${{ matrix.suite }}

      - name: Upload coverage as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: coverage-${{ matrix.suite }}
          path: coverage.xml
          overwrite: true
