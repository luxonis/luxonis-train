name: Metadata

on:
  pull_request:

permissions:
  pull-requests: write
  contents: write
  checks: write

jobs:
  assigner:
    runs-on: ubuntu-latest
    steps:
      - name: Auto-assign
        uses: toshimaru/auto-author-assign@v3.0.2

  labeler:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.head_ref }}

      - name: Labeler
        uses: actions/labeler@v6.1.0
        with:
          configuration-path: .github/labeler.yaml
