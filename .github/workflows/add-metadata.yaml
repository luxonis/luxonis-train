name: Metadata

on:
  pull_request:

permissions:
  pull-requests: write
  contents: write
  checks: write

jobs:
  assigner:
    runs-on: ubuntu-latest
    steps:
      - name: Auto-assign
        uses: toshimaru/auto-author-assign@bdd7688cbf9e6d5683f02f8c7d8ae4062a254b6d

  labeler:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ github.head_ref }}

      - name: Labeler
        uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213
        with:
          configuration-path: .github/labeler.yaml
